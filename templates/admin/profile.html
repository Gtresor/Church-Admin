{% extends 'base.html' %}
{% block content %}
<style>
  .profile-preview-box {
    height: 230px;
    background: #eef2ff;
    overflow: hidden;
  }

  .profile-preview-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .password-toggle-btn {
    min-width: 48px;
    line-height: 1;
  }

  .password-toggle-btn svg {
    width: 18px;
    height: 18px;
    display: block;
    margin: 0 auto;
  }
</style>
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Admin Profile</h3>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="hidden" name="action" value="profile">
      <div class="row g-4 align-items-start">
        <div class="col-lg-4">
          <label class="form-label fw-semibold">Profile Picture</label>
          <div class="border rounded-4 p-3 bg-light-subtle">
            <div id="profilePreviewBox" class="d-flex align-items-center justify-content-center rounded-3 mb-3 profile-preview-box" style="color: #475569; font-weight: 600;">
              <img
                id="profilePreviewImage"
                src="{% if profile.profile_photo %}{{ profile.profile_photo.url }}{% endif %}"
                alt="Admin profile photo"
                class="{% if not profile.profile_photo %}d-none{% endif %}"
                data-original-src="{% if profile.profile_photo %}{{ profile.profile_photo.url }}{% endif %}"
              >
              <span id="profilePreviewPlaceholder" class="{% if profile.profile_photo %}d-none{% endif %}">No Photo</span>
            </div>
            <input id="profilePhotoInput" type="file" name="profile_photo" class="form-control" accept="image/*">
            {% if profile.profile_photo %}
              <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="remove_photo" id="removePhotoCheck">
                <label class="form-check-label" for="removePhotoCheck">Remove current photo</label>
              </div>
            {% endif %}
            <div class="form-text mt-2">Allowed: image files, maximum size 5MB.</div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" value="{{ user.email|default:'' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" value="{{ user.first_name|default:'' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control" value="{{ user.last_name|default:'' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">Role</label>
              <input type="text" class="form-control" value="Administrator" disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label">Account Status</label>
              <input type="text" class="form-control" value="{% if user.is_active %}Active{% else %}Inactive{% endif %}" disabled>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<div class="card border-0 shadow-sm mt-3">
  <div class="card-body">
    <h5 class="mb-3">Security: Change Password</h5>
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="action" value="password">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Current Password</label>
          <div class="input-group">
            <input id="adminCurrentPasswordInput" type="password" name="current_password" class="form-control" required>
            <button id="toggleAdminCurrentPasswordBtn" class="btn btn-outline-secondary password-toggle-btn" type="button" aria-label="Show password" aria-pressed="false" data-password-toggle="true" data-password-target="adminCurrentPasswordInput" data-eye-open-id="adminCurrentEyeOpenIcon" data-eye-closed-id="adminCurrentEyeClosedIcon">
              <svg id="adminCurrentEyeOpenIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg id="adminCurrentEyeClosedIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.83 21.83 0 0 1 5.06-6.94"></path><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.82 21.82 0 0 1-2.16 3.19"></path><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </button>
          </div>
        </div>
        <div class="col-md-4">
          <label class="form-label">New Password</label>
          <div class="input-group">
            <input id="adminNewPasswordInput" type="password" name="new_password" class="form-control" required>
            <button id="toggleAdminNewPasswordBtn" class="btn btn-outline-secondary password-toggle-btn" type="button" aria-label="Show password" aria-pressed="false" data-password-toggle="true" data-password-target="adminNewPasswordInput" data-eye-open-id="adminNewEyeOpenIcon" data-eye-closed-id="adminNewEyeClosedIcon">
              <svg id="adminNewEyeOpenIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg id="adminNewEyeClosedIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.83 21.83 0 0 1 5.06-6.94"></path><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.82 21.82 0 0 1-2.16 3.19"></path><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </button>
          </div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Confirm New Password</label>
          <div class="input-group">
            <input id="adminConfirmPasswordInput" type="password" name="confirm_password" class="form-control" required>
            <button id="toggleAdminConfirmPasswordBtn" class="btn btn-outline-secondary password-toggle-btn" type="button" aria-label="Show password" aria-pressed="false" data-password-toggle="true" data-password-target="adminConfirmPasswordInput" data-eye-open-id="adminConfirmEyeOpenIcon" data-eye-closed-id="adminConfirmEyeClosedIcon">
              <svg id="adminConfirmEyeOpenIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg id="adminConfirmEyeClosedIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.83 21.83 0 0 1 5.06-6.94"></path><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.82 21.82 0 0 1-2.16 3.19"></path><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </button>
          </div>
        </div>
      </div>
      <button class="btn btn-warning mt-3">Change Password</button>
    </form>
  </div>
</div>
<script>
  (() => {
    const fileInput = document.getElementById('profilePhotoInput');
    const previewImage = document.getElementById('profilePreviewImage');
    const previewPlaceholder = document.getElementById('profilePreviewPlaceholder');
    const removePhotoCheck = document.getElementById('removePhotoCheck');
    if (!fileInput || !previewImage || !previewPlaceholder) {
      return;
    }

    const originalSrc = previewImage.dataset.originalSrc || '';
    let previewObjectUrl = null;

    function showImage(src) {
      previewImage.src = src;
      previewImage.classList.remove('d-none');
      previewPlaceholder.classList.add('d-none');
    }

    function showPlaceholder() {
      previewImage.classList.add('d-none');
      previewPlaceholder.classList.remove('d-none');
    }

    function clearObjectUrl() {
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = null;
      }
    }

    fileInput.addEventListener('change', () => {
      clearObjectUrl();
      const file = fileInput.files && fileInput.files[0];
      if (file) {
        previewObjectUrl = URL.createObjectURL(file);
        showImage(previewObjectUrl);
        if (removePhotoCheck) {
          removePhotoCheck.checked = false;
        }
        return;
      }

      if (removePhotoCheck && removePhotoCheck.checked) {
        showPlaceholder();
      } else if (originalSrc) {
        showImage(originalSrc);
      } else {
        showPlaceholder();
      }
    });

    if (removePhotoCheck) {
      removePhotoCheck.addEventListener('change', () => {
        const selectedFile = fileInput.files && fileInput.files[0];
        if (selectedFile) {
          return;
        }
        if (removePhotoCheck.checked) {
          showPlaceholder();
        } else if (originalSrc) {
          showImage(originalSrc);
        } else {
          showPlaceholder();
        }
      });
    }

  })();
</script>
{% endblock %}
