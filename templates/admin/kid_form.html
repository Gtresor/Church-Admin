{% extends 'base.html' %}
{% block content %}
<h3 class="mb-3">{% if person %}Edit Kid Profile{% else %}Create Kid Profile{% endif %}</h3>
<form method="post" class="card card-body">
{% csrf_token %}
<div class="row g-3">
  <div class="col-md-6"><label class="form-label">First Name</label><input name="first_name" class="form-control" value="{{ person.first_name|default:'' }}" required></div>
  <div class="col-md-6"><label class="form-label">Last Name</label><input name="last_name" class="form-control" value="{{ person.last_name|default:'' }}" required></div>
  <div class="col-md-4">
    <label class="form-label">Gender</label>
    <select name="gender" class="form-select" required>
      <option value="">Select</option>
      <option value="Male" {% if person.gender == 'Male' %}selected{% endif %}>Male</option>
      <option value="Female" {% if person.gender == 'Female' %}selected{% endif %}>Female</option>
      <option value="Other" {% if person.gender == 'Other' %}selected{% endif %}>Other</option>
    </select>
  </div>
  <div class="col-md-4"><label class="form-label">Date of Birth</label><input type="date" name="date_of_birth" class="form-control" value="{{ person.date_of_birth|date:'Y-m-d' }}" required></div>
  <div class="col-md-4"><label class="form-label">Phone (Optional)</label><input name="phone" class="form-control" value="{{ person.phone|default:'' }}"></div>
  <div class="col-md-6"><label class="form-label">Email (Optional)</label><input type="email" name="email" class="form-control" value="{{ person.email|default:'' }}"></div>
  <div class="col-md-6"><label class="form-label">Address (Optional)</label><input name="address" class="form-control" value="{{ person.address|default:'' }}"></div>
  {% if person %}
  <div class="col-md-6 form-check mt-4 ms-2"><input class="form-check-input" type="checkbox" name="is_active" {% if person.is_active %}checked{% endif %}><label class="form-check-label">Active</label></div>
  {% endif %}
</div>
<button class="btn btn-primary mt-3">Save</button>
<a href="{% url 'admin_kid_list' %}" class="btn btn-outline-secondary mt-2">Back</a>
</form>
{% endblock %}
