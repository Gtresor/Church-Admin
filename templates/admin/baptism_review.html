{% extends 'base.html' %}
{% block content %}
<h3>Baptism Review - {{ item.person }}</h3>
<div class="card card-body mb-3"><p><strong>Status:</strong> {{ item.status }}</p><p><strong>Comment:</strong> {{ item.admin_comment|default:'-' }}</p></div>
<form method="post" class="card card-body">
{% csrf_token %}
<div class="row g-3">
  <div class="col-md-4"><label>Service Date</label><input type="date" name="service_date" class="form-control" value="{{ item.baptism_date|date:'Y-m-d' }}"></div>
  <div class="col-md-4">
    <label>Officiant</label>
    <select name="officiant_id" class="form-select">
      <option value="">Select officiant</option>
      {% for officiant in officiants %}
      <option value="{{ officiant.id }}" {% if item.officiant == officiant|stringformat:'s' %}selected{% endif %}>{{ officiant }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-12"><label>Admin Comment</label><textarea name="admin_comment" class="form-control">{{ item.admin_comment }}</textarea></div>
</div>
<div class="mt-3 d-flex gap-2">
  <button class="btn btn-success" name="action" value="approve">Approve</button>
  <button class="btn btn-danger" name="action" value="reject">Reject</button>
  <button class="btn btn-warning" name="action" value="schedule">Schedule</button>
  <button class="btn btn-secondary" name="action" value="complete">Mark Completed</button>
</div>
</form>

<form method="post" action="{% url 'admin_generate_baptism_certificate' item.id %}" class="card card-body mt-3">
{% csrf_token %}
<div class="row g-3 align-items-end">
  <div class="col-md-6">
    <label class="form-label">Certificate Design</label>
    <select name="design_template" class="form-select" required>
      <option value="">Select design</option>
      {% for code, label in design_options %}
      <option value="{{ code }}">{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-3">
    <button class="btn btn-primary w-100" type="submit">Generate Certificate</button>
  </div>
</div>
</form>
{% endblock %}
