<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Life Bible Church</title>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:Arial,Helvetica,sans-serif;color:#1a202c;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6fb;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="width:100%;max-width:560px;">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px 12px 0 0;padding:28px 32px;text-align:center;">
              <div style="color:#fff;font-size:20px;font-weight:700;letter-spacing:0.5px;">NEW LIFE BIBLE CHURCH</div>
              <div style="color:rgba(255,255,255,0.75);font-size:12px;margin-top:4px;letter-spacing:1px;">KIGALI, RWANDA</div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:36px 32px;border-radius:0 0 12px 12px;border:1px solid #e8ecf4;border-top:0;">
              {% block body %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 16px;text-align:center;">
              <p style="color:#a0aec0;font-size:11px;margin:0;line-height:1.6;">
                New Life Bible Church &middot; Kigali, Rwanda<br>
                This is an automated notification &mdash; please do not reply to this email.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
