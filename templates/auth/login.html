{% extends 'base.html' %}
{% block global_messages %}{% endblock %}
{% block content %}
<style>
  .login-card {
    border-radius: 1rem;
    border: 0;
  }

  .login-card.login-error {
    border: 1px solid rgba(220, 53, 69, 0.28);
    box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.12), 0 12px 26px rgba(15, 23, 42, 0.1);
    animation: loginCardShake 0.34s ease-in-out 1;
  }

  @keyframes loginCardShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .password-toggle-btn {
    min-width: 48px;
    font-size: 1rem;
    line-height: 1;
  }

  .password-toggle-btn svg {
    width: 18px;
    height: 18px;
    display: block;
    margin: 0 auto;
  }
</style>
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm login-card {% if login_error %}login-error{% endif %}">
      <div class="card-body">
        <h4 class="mb-3">Login</h4>
        {% include 'partials/messages.html' %}
        <form method="post" class="needs-validation" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" value="{{ entered_username|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input id="loginPasswordInput" type="password" name="password" class="form-control" required>
              <button
                id="toggleLoginPasswordBtn"
                class="btn btn-outline-secondary password-toggle-btn"
                type="button"
                aria-label="Show password"
                aria-pressed="false"
                data-password-toggle="true"
                data-password-target="loginPasswordInput"
                data-eye-open-id="eyeOpenIcon"
                data-eye-closed-id="eyeClosedIcon"
              >
                <svg id="eyeOpenIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="eyeClosedIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.83 21.83 0 0 1 5.06-6.94"></path>
                  <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.82 21.82 0 0 1-2.16 3.19"></path>
                  <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>
          <button class="btn btn-primary w-100" type="submit">Sign In</button>
        </form>
        <div class="text-center mt-3 small">
          No account yet? <a href="{% url 'member_register' %}">Create member account</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
